<script>
function exportJson() {

    const data = {
        comptes: JSON.parse(localStorage.getItem('comptes') || '[]'),
        suivi: JSON.parse(localStorage.getItem('suivi') || '{}')
    };

    let blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: 'application/json' }
    );

    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'data.json';

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(a.href);
}
    function exportUsernamesTxt() {

    let comptes = JSON.parse(
        localStorage.getItem('comptes') || '[]'
    );

    if (comptes.length === 0) {
        alert("Aucun compte trouvé");
        return;
    }

    let contenu = comptes
        .map(c => c.username)
        .join('\n');

    let blob = new Blob(
        [contenu],
        { type: 'text/plain;charset=utf-8' }
    );

    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'usernames.txt';

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(a.href);
}
function updateTotalPeriode(){

    const comptes = JSON.parse(
        localStorage.getItem('comptes') || '[]'
    );

    const debut = document.getElementById('dateDebut').value;
    const fin = document.getElementById('dateFin').value;

    let total = 0;

    comptes.forEach(c => {

        const dateCompte = c.creationDate;

        if(
            (!debut || dateCompte >= debut) &&
            (!fin || dateCompte <= fin)
        ){
            total++;
        }
    });

    let texte = `(${total} comptes`;

    if(debut || fin){
        texte += ` du ${debut || '...'} au ${fin || '...'}`;
    }

    texte += ')';

    document.getElementById('totalPeriode').textContent = texte;
}
function totalComptesSemaine() {

    const comptes = JSON.parse(
        localStorage.getItem('comptes') || '[]'
    );

    const now = new Date();

    // Trouver le samedi précédent
    const debut = new Date(now);
    const jour = now.getDay(); // 0=dimanche, 6=samedi

    const diff = (jour + 1) % 7;
    debut.setDate(now.getDate() - diff);
    debut.setHours(0,0,0,0);

    // Vendredi 23:59:59
    const fin = new Date(debut);
    fin.setDate(fin.getDate() + 6);
    fin.setHours(23,59,59,999);

    let total = 0;

    comptes.forEach(c => {

        const d = new Date(c.creation.replace(' ','T'));

        if (d >= debut && d <= fin) {
            total++;
        }
    });

    document.getElementById('totalSemaine').textContent =
        `(${total} comptes cette semaine)`;
}
function copyName(name, element){

}
function exportExcel() {

    let comptes = JSON.parse(
        localStorage.getItem('comptes') || '[]'
    );

    if (comptes.length === 0) {
        alert("Aucun compte trouvé");
        return;
    }

    let wb = XLSX.utils.book_new();

    let data = comptes.map(c => {

        let heure = "";

        if (c.creation) {
            let parts = c.creation.split(" ");
            heure = parts[1] || "";
        }

        return {
            Username: c.username,
            DateCreation: c.creationDate,
            HeureCreation: heure
        };
    });

    let ws = XLSX.utils.json_to_sheet(data);

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Comptes"
    );

    XLSX.writeFile(
        wb,
        "comptes.xlsx"
    );
}

<script>
let comptes=JSON.parse(localStorage.getItem('comptes')||'[]');
let suivi=JSON.parse(localStorage.getItem('suivi')||'{}');

function save(){
 localStorage.setItem('comptes',JSON.stringify(comptes));
 localStorage.setItem('suivi',JSON.stringify(suivi));
}

function jourTravail(){
 let d=new Date();
 if(d.getHours()<7) d.setDate(d.getDate()-1);
 return d.toISOString().slice(0,10);
}

function nowHM(){
 return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

function plus3(h){
 if(!h) return '';
 let [hh,mm]=h.split(':').map(Number);
 hh=(hh+3)%24;
 return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

function add(){

    let date=d.value, heure=t.value;

    if(!date || !heure){

        let n = new Date();

        date =
            n.getFullYear() + '-' +
            String(n.getMonth()+1).padStart(2,'0') + '-' +
            String(n.getDate()).padStart(2,'0');

        heure = n.toTimeString().substring(0,5);
    }

    if(window.editingIndex !== undefined){

        let c = comptes[window.editingIndex];
        c.username = u.value;
        c.mdl = mdl.value;
        c.followers = parseInt(f.value) || 0;
        c.creation = date+' '+heure;
        c.creationDate = date;

        window.editingIndex = undefined;

        document.getElementById('btnAdd').innerText='Ajouter';

        save();
        render();
        u.value = '';
        d.value = '';
        t.value = '';
        f.value = 0;
        u.focus();
        return;
    }
    comptes.push({
        username: u.value || '',
        mdl: mdl.value,
        followers: parseInt(f.value) || 0,
        creation: date + ' ' + heure,
        creationDate: date
    });

    //     username:u.value||'',

    // });

    save();
    render();
    u.value = '';
    d.value = '';
    t.value = '';
    f.value = 0;
    u.focus();
    updateTotalPeriode();

}

function delUser(index){

    let username = comptes[index]?.username || "Inconnu";

    if(!confirm(`Supprimer le compte "${username}" ?`)) return;

    comptes.splice(index,1);

    save();
    render();

function diffJour(creation){

    const c = new Date(creation.replace(' ', 'T'));
    const now = new Date();

    let jours = 1;

    let passage = new Date(c);

    // prochain 07h après la création
    passage.setHours(7,0,0,0);

    if(c >= passage){
        passage.setDate(passage.getDate() + 1);
    }

    while(now >= passage){
        jours++;
        passage.setDate(passage.getDate() + 1);
    }

    return jours;
}

 suivi[j][user] ??= {};
 if(suivi[j][user][type]) return;
 suivi[j][user][type]=nowHM();
 save(); render();
}

function updateTotalPeriode(){

    const comptes = JSON.parse(
        localStorage.getItem('comptes') || '[]'
    );

    const debut = document.getElementById('dateDebut').value;
    const fin = document.getElementById('dateFin').value;

    let total = 0;

    comptes.forEach(c => {

        const dateCompte = c.creationDate;

        if(
            (!debut || dateCompte >= debut) &&
            (!fin || dateCompte <= fin)
        ){
            total++;
        }
    });

    let texte = `(${total} comptes`;

    if(debut || fin){
        texte += ` du ${debut || '...'} au ${fin || '...'}`;
    }

    texte += ')';

    document.getElementById('totalPeriode').textContent = texte;
}
function totalComptesSemaine() {

    const comptes = JSON.parse(
        localStorage.getItem('comptes') || '[]'
    );

    const now = new Date();

    // Trouver le samedi précédent
    const debut = new Date(now);
    const jour = now.getDay(); // 0=dimanche, 6=samedi

    const diff = (jour + 1) % 7;
    debut.setDate(now.getDate() - diff);
    debut.setHours(0,0,0,0);

    // Vendredi 23:59:59
    const fin = new Date(debut);
    fin.setDate(fin.getDate() + 6);
    fin.setHours(23,59,59,999);

    let total = 0;

    comptes.forEach(c => {

        const d = new Date(c.creation.replace(' ','T'));

        if (d >= debut && d <= fin) {
            total++;
        }
    });

    document.getElementById('totalSemaine').textContent =
        `(${total} comptes cette semaine)`;
}

function diffJour(creation){

    const c = new Date(creation.replace(' ', 'T'));
    const now = new Date();

    let jours = 1;

    let passage = new Date(c);

    // prochain 07h après la création
    passage.setHours(7,0,0,0);

    if(c >= passage){
        passage.setDate(passage.getDate() + 1);
    }

    while(now >= passage){
        jours++;
        passage.setDate(passage.getDate() + 1);
    }

    return jours;
}

      html+=`<tr>
      <td>${index + 1}</td>
      <td>
        ${c.username}
        <br>
        <small
            style="cursor:pointer;color:blue"
            onclick="copyLink('${c.username}', this)"
        >
            https://getmysocial.com/${getMySocial(c.username)}
        </small>
        <br>
        <small
            id="follow_${index}"
            style="cursor:pointer"
            onclick="copyFollow('${c.username}', this)"
            title="Cliquer pour copier"
        >
            Follow @${c.username} ❤️
        </small>
        <br>
        <small
            style="cursor:pointer;color:green"
            onclick="copyRandomCaption(this)"
            title="Cliquer pour copier un caption aléatoire"
        >
            📋 Caption Post
        </small>
        <br>
        <small>${c.creation}</small>
      </td>
      <td>${c.mdl || 'Annie'}</td>
      <td>
        <input
            type="number"
            min="0"
            value="${c.followers || 0}"
            style="width:10px"
            onchange="updateFollowers(${index}, this.value)"
        >
      </td>
      <td>J${jc}</td>
      <td><input type="checkbox" ${s.post?'checked disabled':''} onclick="check('${c.username}','post')"> Post ${jc}</td>
      <td>${s.post||''}</td>
      <td>Reel ${jc}<br>${plus3(s.post)}</td>
      <td><input type="checkbox" ${s.reel?'checked disabled':''} onclick="check('${c.username}','reel')"> Reel ${jc}</td>
      <td>${s.reel||''}</td>
      <td>-</td>
      <td>-</td>
      <td>
        <button onclick="editUser(${index})">✏️</button>
        <button onclick="delUser(${index})">🗑️</button>
      </td>
      </tr>`;
   }else{
    let tasks = getTasksByFollowers(c.followers);

    let part = Math.ceil(tasks.length / 3);

    let col1 = tasks.slice(0, part);
    let col2 = tasks.slice(part, part * 2);
    let col3 = tasks.slice(part * 2);

    html += `<tr>
    <td>${index + 1}</td>

    <td>
        ${c.username}
        <br>
        <small
            style="cursor:pointer;color:blue"
            onclick="copyLink('${c.username}', this)"
        >
            https://getmysocial.com/${getMySocial(c.username)}
        </small>
        <br>
        <small
            id="follow_${index}"
            style="cursor:pointer"
            onclick="copyFollow('${c.username}', this)"
        >
            Follow @${c.username} ❤️
        </small>
        <br>
        <small>${c.creation}</small>
    </td>
    <td>${c.mdl || 'Annie'}</td>
    <td>${c.followers || 0}</td>

    <td>J${jc}</td>

    <td>
        ${col1.map(t => `
            <label>
                <input type="checkbox"
                    ${s[t] ? 'checked disabled' : ''}
                    onclick="check('${c.username}','${t}')">
                ${t}
            </label><br>
        `).join('')}
    </td>

    <td>
        ${col1.map(t => s[t] || '').filter(Boolean).join('<br>')}
    </td>

    <td>
        ${col2.map(t => `
            <label>
                <input type="checkbox"
                    ${s[t] ? 'checked disabled' : ''}
                    onclick="check('${c.username}','${t}')">
                ${t}
            </label><br>
        `).join('')}
    </td>

    <td>
        ${col2.map(t => s[t] || '').filter(Boolean).join('<br>')}
    </td>

    <td>
        ${col3.map(t => `
            <label>
                <input type="checkbox"
                    ${s[t] ? 'checked disabled' : ''}
                    onclick="check('${c.username}','${t}')">
                ${t}
            </label><br>
        `).join('')}

        <hr>

        <label>
            <input type="checkbox"
                ${s.story ? 'checked disabled' : ''}
                onclick="check('${c.username}','story')">
            Story
        </label>
    </td>

    <td>
        ${col3.map(t => s[t] || '').filter(Boolean).join('<br>')}
        ${s.story ? '<br>' + s.story : ''}
    </td>

    <td>
        <button onclick="editUser(${index})">✏️</button>
        <button onclick="delUser(${index})">🗑️</button>
    </td>

    </tr>`;
}
 });
 document.getElementById('tb').innerHTML=html;
 updateTotalPeriode();
}
function getMySocial(username){
    return username
        .toLowerCase()
        .replace(/[^a-z0-9]/g,'');
}

render();
</script>
